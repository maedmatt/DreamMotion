<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>G1 Motion Agent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css?v=4">
</head>
<body>
  <div class="app-container">

    <header class="top-bar">
      <button type="button" id="settings-btn" class="settings-btn" title="Settings" aria-label="Open settings">
        <svg viewBox="0 0 24 24" fill="none" class="settings-icon">
          <path d="M12 8.5C10.067 8.5 8.5 10.067 8.5 12C8.5 13.933 10.067 15.5 12 15.5C13.933 15.5 15.5 13.933 15.5 12C15.5 10.067 13.933 8.5 12 8.5Z" stroke="currentColor" stroke-width="1.8"/>
          <path d="M19.4 13.5C19.47 13.01 19.5 12.51 19.5 12C19.5 11.49 19.47 10.99 19.4 10.5L21.2 9.1C21.36 8.97 21.4 8.75 21.3 8.57L19.6 5.63C19.5 5.45 19.28 5.37 19.09 5.44L16.96 6.3C16.18 5.7 15.31 5.2 14.37 4.84L14.04 2.59C14.01 2.38 13.82 2.22 13.6 2.22H10.2C9.98 2.22 9.79 2.38 9.76 2.59L9.43 4.84C8.49 5.2 7.62 5.7 6.84 6.3L4.71 5.44C4.52 5.37 4.3 5.45 4.2 5.63L2.5 8.57C2.4 8.75 2.44 8.97 2.6 9.1L4.4 10.5C4.33 10.99 4.3 11.49 4.3 12C4.3 12.51 4.33 13.01 4.4 13.5L2.6 14.9C2.44 15.03 2.4 15.25 2.5 15.43L4.2 18.37C4.3 18.55 4.52 18.63 4.71 18.56L6.84 17.7C7.62 18.3 8.49 18.8 9.43 19.16L9.76 21.41C9.79 21.62 9.98 21.78 10.2 21.78H13.6C13.82 21.78 14.01 21.62 14.04 21.41L14.37 19.16C15.31 18.8 16.18 18.3 16.96 17.7L19.09 18.56C19.28 18.63 19.5 18.55 19.6 18.37L21.3 15.43C21.4 15.25 21.36 15.03 21.2 14.9L19.4 13.5Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
        </svg>
      </button>
      <h1>G1 Motion Agent</h1>
      <form id="prompt-form">
        <div class="search-container">
          <input type="text" id="prompt-input" placeholder="Describe a motion or just say hi..." autocomplete="off" required />
          <button type="button" id="mic-btn" title="Use microphone" aria-label="Use microphone">
            <svg viewBox="0 0 24 24" fill="none" class="mic-icon">
              <path d="M12 3C10.343 3 9 4.343 9 6V11C9 12.657 10.343 14 12 14C13.657 14 15 12.657 15 11V6C15 4.343 13.657 3 12 3Z" stroke="currentColor" stroke-width="2"/>
              <path d="M5 11C5 14.866 8.134 18 12 18C15.866 18 19 14.866 19 11" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <path d="M12 18V21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <path d="M9 21H15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </button>
          <button type="submit" id="submit-btn">
            <svg viewBox="0 0 24 24" fill="none" class="send-icon">
              <path d="M22 2L11 13M22 2L15 22L11 13M22 2L2 9L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      </form>
    </header>

    <main class="content-area">
      <div id="status-message" class="status-message hidden">
        <span class="badge">LLM Optimized</span>
        <p id="refined-prompt-text"></p>
        <div class="loader hidden" id="loading-spinner"></div>
      </div>

      <div id="agent-reply" class="agent-reply hidden">
        <div class="agent-reply-header">
          <svg viewBox="0 0 24 24" fill="none" class="reply-icon"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z" fill="currentColor"/></svg>
          <span>Agent Reply</span>
          <button type="button" id="speak-btn" class="speak-btn" title="Play reply aloud" aria-label="Play reply aloud">
            <svg viewBox="0 0 24 24" fill="none" class="speak-icon" id="speak-icon-play">
              <path d="M3 9v6h4l5 5V4L7 9H3z" fill="currentColor"/>
              <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z" fill="currentColor"/>
              <path d="M19 12c0 2.97-1.65 5.54-4 6.71v2.06c3.45-1.27 6-4.64 6-8.77s-2.55-7.5-6-8.77v2.06c2.35 1.17 4 3.74 4 6.71z" fill="currentColor"/>
            </svg>
            <svg viewBox="0 0 24 24" fill="none" class="speak-icon speak-icon-stop hidden" id="speak-icon-stop">
              <rect x="6" y="6" width="12" height="12" rx="2" fill="currentColor"/>
            </svg>
          </button>
        </div>
        <p id="agent-reply-text"></p>
      </div>

      <div class="viewer-container" id="viewer-container">
        <div id="viewer-overlay" class="viewer-overlay">
          <span>Enter a prompt to preview motion</span>
        </div>
      </div>

      <div class="action-bar hidden" id="action-bar"></div>
    </main>
  </div>

  <div id="presentation-thoughts" class="presentation-thoughts hidden" aria-live="polite">
    <div class="pres-steps" id="pres-steps">
      <div class="pres-step" data-step="llm">
        <div class="pres-step-ring"><div class="pres-step-dot"></div></div>
        <span>Understand</span>
      </div>
      <div class="pres-step-line"></div>
      <div class="pres-step" data-step="kimodo">
        <div class="pres-step-ring"><div class="pres-step-dot"></div></div>
        <span>Generate</span>
      </div>
    </div>
    <div class="pres-text-area" id="pres-text-area"></div>
  </div>

  <div id="settings-modal" class="settings-modal hidden" role="dialog" aria-modal="true" aria-labelledby="settings-title">
    <div class="settings-panel">
      <div class="settings-header">
        <h2 id="settings-title">Settings</h2>
        <button type="button" id="settings-close-btn" class="settings-close-btn" aria-label="Close settings">X</button>
      </div>

      <div class="settings-row">
        <label for="mic-select">Microphone</label>
        <select id="mic-select" class="settings-select"></select>
      </div>

      <div class="settings-row">
        <label for="tts-target-select">Speech Output</label>
        <select id="tts-target-select" class="settings-select">
          <option value="web">Play on Web (Browser)</option>
          <option value="robot">Play on Robot</option>
        </select>
      </div>

      <div class="settings-row">
        <label for="tts-voice-select">TTS Voice</label>
        <select id="tts-voice-select" class="settings-select">
          <option value="alloy">Alloy</option>
          <option value="echo">Echo</option>
          <option value="fable">Fable</option>
          <option value="onyx">Onyx</option>
          <option value="nova">Nova</option>
          <option value="shimmer">Shimmer</option>
        </select>
      </div>

      <div class="settings-row settings-row-toggle">
        <label for="auto-speak-toggle">Auto-play Reply</label>
        <input type="checkbox" id="auto-speak-toggle" />
      </div>
      <p class="mode-description">Automatically speak the agent reply after generation.</p>

      <div class="settings-row settings-row-toggle">
        <label for="presentation-mode-toggle">Presentation Mode</label>
        <input type="checkbox" id="presentation-mode-toggle" />
      </div>
      <p id="mode-description" class="mode-description"></p>
    </div>
  </div>

  <script src="/static/app.js?v=4"></script>
</body>
</html>
