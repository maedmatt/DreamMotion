<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #fff;
      font-family: sans-serif;
    }
    #status {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      padding: 8px 12px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid #e5e7eb;
      color: #111827;
      font-size: 13px;
      pointer-events: none;
      z-index: 10;
      white-space: nowrap;
    }
    #displacement {
      position: absolute;
      bottom: 10px;
      left: 10px;
      padding: 6px 10px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.6);
      color: #fff;
      font-size: 12px;
      font-family: monospace;
      pointer-events: none;
      z-index: 10;
      line-height: 1.5;
    }
  </style>
  <script src="https://unpkg.com/three@0.146.0/build/three.js"></script>
  <script src="https://unpkg.com/three@0.146.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://unpkg.com/three@0.146.0/examples/js/loaders/STLLoader.js"></script>
  <script src="https://unpkg.com/urdf-loader@0.10.3/umd/URDFLoader.js"></script>
</head>
<body>
  <div id="status"></div>
  <div id="displacement"></div>
  <script>
    const TASK_ID = __TASK_ID_JSON__;
    const G1_JOINT_NAMES = ['left_hip_pitch_joint', 'left_hip_roll_joint', 'left_hip_yaw_joint', 'left_knee_joint', 'left_ankle_pitch_joint', 'left_ankle_roll_joint', 'right_hip_pitch_joint', 'right_hip_roll_joint', 'right_hip_yaw_joint', 'right_knee_joint', 'right_ankle_pitch_joint', 'right_ankle_roll_joint', 'waist_yaw_joint', 'waist_roll_joint', 'waist_pitch_joint', 'left_shoulder_pitch_joint', 'left_shoulder_roll_joint', 'left_shoulder_yaw_joint', 'left_elbow_joint', 'left_wrist_roll_joint', 'left_wrist_pitch_joint', 'left_wrist_yaw_joint', 'right_shoulder_pitch_joint', 'right_shoulder_roll_joint', 'right_shoulder_yaw_joint', 'right_elbow_joint', 'right_wrist_roll_joint', 'right_wrist_pitch_joint', 'right_wrist_yaw_joint'];
    const JOINT_COUNT = 29;
    const FPS = 30;

    const statusEl = document.getElementById('status');
    function setStatus(msg) {
      statusEl.textContent = msg;
    }
    setStatus('Loading 3D viewer...');
    window.addEventListener('error', (e) => {
      const msg = (e && e.message) ? e.message : 'unknown script error';
      setStatus('Viewer error: ' + msg);
    });

    if (!window.THREE) {
      setStatus('Viewer error: Three.js failed to load');
      throw new Error('THREE missing');
    }
    const URDFLoaderCtor = window.URDFLoader || (window.urdf && window.urdf.URDFLoader);
    if (!URDFLoaderCtor) {
      setStatus('Viewer error: URDFLoader failed to load');
      throw new Error('URDFLoader missing');
    }

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xf8fafc);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.05, 40);
    camera.position.set(2.2, 1.4, 2.2);

    const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: 'high-performance' });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 1.5));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = false;
    document.body.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0.75, 0);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.update();

    scene.add(new THREE.HemisphereLight(0xffffff, 0x64748b, 1.0));
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(3, 5, 4);
    scene.add(dirLight);

    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(12, 12),
      new THREE.MeshStandardMaterial({ color: 0xe5e7eb, roughness: 1.0, metalness: 0.0 })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = -0.001;
    scene.add(floor);

    const grid = new THREE.GridHelper(12, 24, 0x94a3b8, 0xcbd5e1);
    grid.position.y = 0.0;
    grid.material.opacity = 0.3;
    grid.material.transparent = true;
    scene.add(grid);

    // 1m concentric rings for distance reference
    for (const radius of [0.5, 1.0, 1.5, 2.0]) {
      const ringGeo = new THREE.RingGeometry(radius - 0.005, radius + 0.005, 64);
      const ringMat = new THREE.MeshBasicMaterial({
        color: radius === 1.0 ? 0x3b82f6 : 0x94a3b8,
        side: THREE.DoubleSide,
        transparent: true,
        opacity: radius === 1.0 ? 0.5 : 0.25,
      });
      const ring = new THREE.Mesh(ringGeo, ringMat);
      ring.rotation.x = -Math.PI / 2;
      ring.position.y = 0.002;
      scene.add(ring);
    }

    let robot = null;
    let rowFrames = null;
    let startedAtMs = 0;
    let jointIndices = [];
    let rootCols = null;
    let promptText = '';
    let groundAligned = false;
    let hasRootOrigin = false;

    const dispEl = document.getElementById('displacement');
    let lastDispUpdate = 0;

    const zUpToYUp = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1, 0, 0), -Math.PI / 2);
    const yUpToZUp = zUpToYUp.clone().invert();
    const tmpPos = new THREE.Vector3();
    const rootOrigin = new THREE.Vector3();
    const tmpQuat = new THREE.Quaternion();

    function parseCsvRows(text) {
      if (!text || !text.trim()) return null;
      const lines = text.trim().split('\n').filter(Boolean);
      if (lines.length < 2) return null;
      const headers = lines[0].split(',');
      const indexByHeader = {};
      headers.forEach((h, i) => { indexByHeader[h] = i; });
      const jointStart = indexByHeader.joint_0;
      if (jointStart === undefined) return null;
      const root = {
        x: indexByHeader.root_x,
        y: indexByHeader.root_y,
        z: indexByHeader.root_z,
        qw: indexByHeader.quat_w,
        qx: indexByHeader.quat_x,
        qy: indexByHeader.quat_y,
        qz: indexByHeader.quat_z
      };
      const rows = new Array(lines.length - 1);
      for (let i = 1; i < lines.length; i++) {
        rows[i - 1] = lines[i].split(',').map(Number);
      }
      return { rows, indexByHeader, jointStart, root };
    }

    function applyFrame(row) {
      if (!robot || !row) return;

      if (rootCols) {
        const rx = row[rootCols.x];
        const ry = row[rootCols.y];
        const rz = row[rootCols.z];
        if (Number.isFinite(rx) && Number.isFinite(ry) && Number.isFinite(rz)) {
          if (!hasRootOrigin) {
            rootOrigin.set(rx, ry, rz);
            hasRootOrigin = true;
          }
          // Center horizontally (MuJoCo XY), keep absolute height (Z)
          tmpPos.set(rx - rootOrigin.x, ry - rootOrigin.y, rz);
          tmpPos.applyQuaternion(zUpToYUp);
          motionRoot.position.copy(tmpPos);
        }

        const qw = row[rootCols.qw];
        const qx = row[rootCols.qx];
        const qy = row[rootCols.qy];
        const qz = row[rootCols.qz];
        if (Number.isFinite(qw) && Number.isFinite(qx) && Number.isFinite(qy) && Number.isFinite(qz)) {
          tmpQuat.set(qx, qy, qz, qw).normalize();
          tmpQuat.premultiply(zUpToYUp).multiply(yUpToZUp);
          motionRoot.quaternion.copy(tmpQuat);
        } else {
          motionRoot.quaternion.identity();
        }
      }

      for (let i = 0; i < jointIndices.length; i++) {
        const pair = jointIndices[i];
        const angle = row[pair.csvCol];
        if (Number.isFinite(angle)) pair.joint.setJointValue(angle);
      }
    }

    const manager = new THREE.LoadingManager();
    manager.onError = function (url) {
      setStatus('Failed loading: ' + url);
    };
    manager.onStart = function () {
      setStatus('Loading G1 model...');
    };
    manager.onLoad = function () {
      alignRobotToGround(true);
    };
    const loader = new URDFLoaderCtor(manager);
    loader.packages = { g1_description: '/static/g1_description' };

    const motionRoot = new THREE.Group();
    scene.add(motionRoot);
    const robotRoot = new THREE.Group();
    robotRoot.rotation.x = -Math.PI / 2;
    motionRoot.add(robotRoot);
    const bbox = new THREE.Box3();
    function alignRobotToGround(force) {
      if (groundAligned && !force) return;
      if (!robot) return;
      robotRoot.updateMatrixWorld(true);
      bbox.setFromObject(robotRoot);
      if (!Number.isFinite(bbox.min.y)) return;
      const targetMinY = 0.01;
      const delta = targetMinY - bbox.min.y;
      robotRoot.position.y += delta;
      robotRoot.updateMatrixWorld(true);
      groundAligned = true;
    }

    loader.load(
      '/static/g1_description/urdf/g1_29dof.urdf',
      (loadedRobot) => {
        robot = loadedRobot;
        robotRoot.add(robot);
        alignRobotToGround(false);

        jointIndices = [];
        for (let i = 0; i < JOINT_COUNT; i++) {
          const jointName = G1_JOINT_NAMES[i];
          const joint = robot.joints[jointName];
          if (joint) {
            jointIndices.push({ joint, csvCol: i });
          }
        }

        if (rowFrames && rowFrames.length > 0) {
          robotRoot.position.set(0, 0, 0);
          groundAligned = true;
          applyFrame(rowFrames[0]);
          startedAtMs = performance.now();
          setStatus(promptText + ' \u00b7 ' + rowFrames.length + ' frames');
        } else {
          setStatus('Model loaded. Waiting for motion...');
        }
      },
      undefined,
      (err) => {
        console.error(err);
        setStatus('Failed to load URDF/model assets');
      }
    );

    setTimeout(() => {
      if (!robot) {
        setStatus('Still loading model... check network/CDN access');
      }
    }, 8000);

    async function loadMotion(taskId) {
      if (!taskId) return;
      setStatus('Fetching motion data...');
      try {
        const res = await fetch('/api/motion/' + encodeURIComponent(taskId));
        if (!res.ok) {
          throw new Error('HTTP ' + res.status);
        }
        const data = await res.json();
        promptText = data.prompt || '';
        const parsed = parseCsvRows(data.csv || '');
        if (!parsed || !parsed.rows || parsed.rows.length === 0) {
          rowFrames = null;
          rootCols = null;
          hasRootOrigin = false;
          motionRoot.position.set(0, 0, 0);
          motionRoot.quaternion.identity();
          setStatus((promptText || 'Motion') + ' \u00b7 no frames');
          return;
        }
        rootCols = parsed.root;
        hasRootOrigin = false;
        for (let i = 0; i < jointIndices.length; i++) {
          jointIndices[i].csvCol = parsed.jointStart + i;
        }
        rowFrames = parsed.rows;
        startedAtMs = performance.now();
        // Reset ground alignment offset — absolute height from CSV is used
        robotRoot.position.set(0, 0, 0);
        groundAligned = true;
        if (robot) {
          applyFrame(rowFrames[0]);
        }
        setStatus((promptText || 'Motion') + ' \u00b7 ' + rowFrames.length + ' frames');
      } catch (e) {
        console.error(e);
        setStatus('Failed to fetch motion data');
      }
    }

    window.addEventListener('message', (event) => {
      const data = event && event.data;
      if (!data || data.type !== 'loadMotion') return;
      if (typeof data.taskId !== 'string') return;
      loadMotion(data.taskId);
    });

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        if (robot && !groundAligned) {
          alignRobotToGround(false);
        }
        if (robot && rowFrames && rowFrames.length > 0) {
          const elapsedSec = (performance.now() - startedAtMs) / 1000;
          const frameIdx = Math.floor(elapsedSec * FPS) % rowFrames.length;
          applyFrame(rowFrames[frameIdx]);

          const now = performance.now();
          if (rootCols && now - lastDispUpdate > 100) {
            lastDispUpdate = now;
            const row = rowFrames[frameIdx];
            const dx = row[rootCols.x] - rowFrames[0][rootCols.x];
            const dy = row[rootCols.y] - rowFrames[0][rootCols.y];
            const dist = Math.sqrt(dx * dx + dy * dy);
            dispEl.textContent =
              'fwd ' + dx.toFixed(2) + 'm  lat ' + dy.toFixed(2) + 'm  |  ' + dist.toFixed(2) + 'm' +
              '\nframe ' + frameIdx + '/' + (rowFrames.length - 1);
          }
        }
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    loadMotion(TASK_ID);
  </script>
</body>
</html>
